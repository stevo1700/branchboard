<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Branchboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;650;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --canvas:#F4F6F8; --panel:#FFF; --ink:#1C2433; --inkSoft:#5A6577; --inkFaint:#94A0B3;
    --line:#DBE1EA; --guide:#CAD3E0; --accent:#4338CA; --accentSoft:#EEF0FF; --accentLine:#C7CBF5;
    --warn:#D97706; --warnSoft:#FEF3E2; --warnLine:#F6D8A8; --done:#15803D; --doneSoft:#E7F6EC; --danger:#C2410C;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--canvas);color:var(--ink)}
  textarea,input{font-family:inherit}
  .bb-row{transition:background .14s ease, box-shadow .2s ease}
  .bb-actions{opacity:0;transition:opacity .14s ease}
  .bb-row:hover .bb-actions{opacity:1}
  .bb-msg{cursor:pointer}
  .bb-msg:hover{text-decoration:underline;text-underline-offset:3px}
  .scroll::-webkit-scrollbar{width:9px}
  .scroll::-webkit-scrollbar-thumb{background:var(--guide);border-radius:8px}
  @keyframes flash{0%{box-shadow:0 0 0 3px var(--warn)}100%{box-shadow:0 0 0 0 transparent}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ---- inline icons ---- */
const P = {
  plus:["M5 12h14","M12 5v14"], chev:["m9 18 6-6-6-6"],
  reply:["M9 14 4 9l5-5","M4 9h11a4 4 0 0 1 4 4v3"],
  pencil:["M12 20h9","M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"],
  trash:["M3 6h18","M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2","M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"],
  zap:["M13 2 3 14h9l-1 8 10-12h-9l1-8Z"], x:["M18 6 6 18","M6 6l12 12"],
  check:["M20 6 9 17l-5-5"], rotate:["M3 2v6h6","M3.5 15a9 9 0 1 0 2-9.4L3 8"],
  msg:["M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"],
};
function Icon({n, s=16, fill=false}){
  const paths = P[n] || [];
  return (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:"block"}}>
      {n==="circleCheck" ? (<><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>)
       : n==="circleDot" ? (<><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/></>)
       : paths.map((d,i)=><path key={i} d={d} fill={fill?"currentColor":"none"}/>)}
    </svg>
  );
}

const AVATAR=["#4338CA","#0D9488","#B5560E","#9333EA","#0369A1","#BE185D","#15803D","#B45309"];
const VERDICTS=[{k:"a",l:"A holds"},{k:"b",l:"B holds"},{k:"both",l:"Both reconciled"},{k:"none",l:"Not a real conflict"}];
const API="/api";

/* ---- api helper ---- */
async function api(path, method="GET", body){
  const r = await fetch(API+path,{method,headers:{"Content-Type":"application/json"},body:body?JSON.stringify(body):undefined});
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||"Request failed"); }
  return r.json();
}

/* ============================ App ============================ */
function App(){
  const [data,setData]=useState({nodes:{},rootOrder:[],links:[]});
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState(null);
  const [name,setName]=useState(()=>localStorage.getItem("bb_name")||"");
  const [collapsed,setCollapsed]=useState(()=>new Set());
  const [linkFrom,setLinkFrom]=useState(null);
  const [panel,setPanel]=useState(false);
  const [flash,setFlash]=useState(null);
  const [addingRoot,setAddingRoot]=useState(false);

  const refetch=useCallback(async()=>{
    try{ const s=await api("/state"); setData(s); setErr(null); }
    catch(e){ setErr(e.message); }
  },[]);

  useEffect(()=>{ (async()=>{ await refetch(); setLoading(false); })(); },[refetch]);
  useEffect(()=>{ const t=setInterval(refetch,3000); return ()=>clearInterval(t); },[refetch]);
  useEffect(()=>{ const h=e=>e.key==="Escape"&&setLinkFrom(null); window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h); },[]);

  const who=()=>name.trim()||"Anonymous";
  const run=async(fn)=>{ try{ const s=await fn(); if(s) setData(s); setErr(null);}catch(e){ setErr(e.message);} };

  const addNode=(parentId,text)=>{ if(parentId) setCollapsed(s=>{const n=new Set(s);n.delete(parentId);return n;}); return run(()=>api("/nodes","POST",{parentId,text,author:who()})); };
  const editNode=(id,text)=>run(()=>api("/nodes/"+id,"PATCH",{text}));
  const delNode=(id)=>run(()=>api("/nodes/"+id,"DELETE"));
  const toggle=(id)=>setCollapsed(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});

  const startLink=(id)=>setLinkFrom(id);
  const completeLink=async(target)=>{
    if(!linkFrom||target===linkFrom){setLinkFrom(null);return;}
    await run(()=>api("/links","POST",{a:linkFrom,b:target,reporter:who()}));
    setLinkFrom(null); setPanel(true);
  };
  const resolveLink=(id,r)=>run(()=>api("/links/"+id,"PATCH",{status:"resolved",...r,resolver:who()}));
  const reopenLink=(id)=>run(()=>api("/links/"+id,"PATCH",{status:"open"}));
  const delLink=(id)=>run(()=>api("/links/"+id,"DELETE"));

  const doFlash=(id)=>{ const el=document.getElementById("node-"+id); if(el)el.scrollIntoView({behavior:"smooth",block:"center"}); setFlash(id); setTimeout(()=>setFlash(f=>f===id?null:f),1300); };

  const linksByNode={};
  data.links.forEach(l=>{ (linksByNode[l.a]=linksByNode[l.a]||[]).push(l); (linksByNode[l.b]=linksByNode[l.b]||[]).push(l); });
  const openCount=data.links.filter(l=>l.status==="open").length;
  const h={addNode,editNode,delNode,toggle,startLink,completeLink,linkFrom,collapsed,linksByNode,doFlash,flash};
  const empty=data.rootOrder.length===0;

  return (
    <div>
      <header style={{position:"sticky",top:0,zIndex:6,background:"var(--panel)",borderBottom:"1px solid var(--line)",padding:"13px 18px"}}>
        <div style={{maxWidth:780,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:11}}>
            <div style={{width:34,height:34,borderRadius:9,background:"var(--accent)",display:"grid",placeItems:"center",color:"#fff"}}><Icon n="msg" s={18}/></div>
            <div>
              <div style={{fontSize:15.5,fontWeight:700,letterSpacing:-0.2}}>Branchboard</div>
              <div style={{fontSize:11.5,color:"var(--inkFaint)",marginTop:-1}}>Branching conversation · flag &amp; resolve contradictions</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input value={name} onChange={e=>setName(e.target.value)} onBlur={e=>localStorage.setItem("bb_name",e.target.value)} placeholder="Your name"
              style={{width:104,border:"1px solid var(--line)",borderRadius:8,padding:"8px 11px",fontSize:13,color:"var(--ink)",outline:"none"}}/>
            <button onClick={()=>setPanel(true)} style={pill(openCount>0)}><Icon n="zap" s={14}/> {openCount}</button>
            <button onClick={()=>setAddingRoot(true)} style={btn("var(--accent)","#fff")}><Icon n="plus" s={16}/> Thread</button>
          </div>
        </div>
      </header>

      {linkFrom&&data.nodes[linkFrom]&&(
        <div style={{position:"sticky",top:60,zIndex:6,background:"var(--warnSoft)",borderBottom:"1px solid var(--warnLine)",padding:"9px 18px"}}>
          <div style={{maxWidth:780,margin:"0 auto",display:"flex",alignItems:"center",gap:10,fontSize:13,color:"var(--warn)",fontWeight:600}}>
            <Icon n="zap" s={15}/>
            <span style={{flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Pick the message that contradicts “{data.nodes[linkFrom].text}”</span>
            <button onClick={()=>setLinkFrom(null)} style={{...iconBtn("var(--warn)"),background:"#fff"}}><Icon n="x" s={15}/></button>
          </div>
        </div>
      )}

      <main className="scroll" style={{maxWidth:780,margin:"0 auto",padding:"18px 14px 80px"}}>
        {err&&<div style={{background:"#FDEEE6",border:"1px solid var(--warnLine)",color:"var(--danger)",borderRadius:9,padding:"9px 12px",fontSize:13,marginBottom:14}}>{err}</div>}

        {addingRoot&&(
          <div style={{border:"1px dashed var(--accentLine)",borderRadius:11,marginBottom:10,background:"#fff"}}>
            <Composer placeholder="Start a thread — what's the topic?" onSave={t=>{addNode(null,t);setAddingRoot(false);}} onCancel={()=>setAddingRoot(false)}/>
          </div>
        )}

        {loading?<div style={{color:"var(--inkFaint)",textAlign:"center",padding:40,fontSize:14}}>Loading the conversation…</div>
         :empty?<Empty onAdd={()=>setAddingRoot(true)}/>
         :data.rootOrder.map(rid=>(
           <div key={rid} style={{background:"var(--panel)",border:"1px solid var(--line)",borderRadius:13,padding:8,marginBottom:12,boxShadow:"0 1px 2px rgba(20,30,50,.03)"}}>
             <Node id={rid} data={data} h={h}/>
           </div>
         ))}
      </main>

      {panel&&<Panel data={data} onClose={()=>setPanel(false)} onResolve={resolveLink} onReopen={reopenLink} onRemove={delLink}
        onJump={id=>{setPanel(false);setTimeout(()=>doFlash(id),60);}}/>}
    </div>
  );
}

/* ===================== Node (recursive) ===================== */
function Node({id,data,h}){
  const node=data.nodes[id];
  const [editing,setEditing]=useState(false);
  const [replying,setReplying]=useState(false);
  if(!node) return null;
  const kids=node.children, open=!h.collapsed.has(id);
  const myLinks=h.linksByNode[id]||[];
  const linking=h.linkFrom===id, linkMode=!!h.linkFrom, flashing=h.flash===id;
  const color=AVATAR[hashName(node.author)%AVATAR.length];
  const onMsg=()=>{ if(linkMode){ if(!linking)h.completeLink(id); return;} if(kids.length)h.toggle(id); };

  return (
    <div>
      <div id={"node-"+id} className="bb-row" style={{display:"flex",gap:8,padding:"8px 9px",borderRadius:10,
        background:linking?"var(--warnSoft)":"transparent",
        boxShadow:linkMode&&!linking?"inset 0 0 0 1px var(--accentLine)":"none",
        cursor:linkMode&&!linking?"crosshair":"default",
        animation:flashing?"flash 1.3s ease":"none"}}>
        <button onClick={()=>kids.length&&h.toggle(id)} aria-label={open?"Collapse":"Expand"}
          style={{width:20,height:22,display:"grid",placeItems:"center",border:"none",background:"transparent",
          cursor:kids.length?"pointer":"default",visibility:kids.length?"visible":"hidden",flexShrink:0}}>
          <span style={{display:"block",color:"var(--inkSoft)",transform:open?"rotate(90deg)":"none",transition:"transform .2s ease"}}><Icon n="chev" s={15}/></span>
        </button>

        <div style={{width:26,height:26,borderRadius:"50%",background:color,color:"#fff",display:"grid",placeItems:"center",fontSize:11,fontWeight:700,flexShrink:0,marginTop:1}}>{initials(node.author)}</div>

        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:11.5,color:"var(--inkFaint)",marginBottom:1}}>
            <span style={{fontWeight:600,color:"var(--inkSoft)"}}>{node.author}</span> · {when(node.createdAt)}
            {node.parentId==null&&<span style={{marginLeft:6,fontWeight:700,color:"var(--accent)",letterSpacing:.4}}>THREAD</span>}
          </div>

          {editing?
            <Composer initial={node.text} compact onSave={t=>{h.editNode(id,t);setEditing(false);}} onCancel={()=>setEditing(false)}/>
           :<div className="bb-msg" onClick={onMsg} onDoubleClick={()=>!linkMode&&setEditing(true)}
              style={{fontSize:14.5,lineHeight:1.5,color:"var(--ink)",whiteSpace:"pre-wrap",wordBreak:"break-word",fontWeight:node.parentId==null?600:450}}>
              {node.text}
              {kids.length>0&&<span style={{marginLeft:8,fontSize:11.5,fontWeight:500,color:"var(--inkFaint)"}}>{kids.length} {kids.length===1?"reply":"replies"}</span>}
            </div>}

          {myLinks.length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:6}}>
              {myLinks.map(l=>{ const oid=l.a===id?l.b:l.a; const other=data.nodes[oid]; const done=l.status==="resolved";
                return <button key={l.id} onClick={()=>h.doFlash(oid)} title={done?"Resolved":"Open contradiction"}
                  style={{display:"inline-flex",alignItems:"center",gap:4,border:"none",borderRadius:20,padding:"3px 9px",fontSize:11.5,fontWeight:600,cursor:"pointer",
                  background:done?"var(--doneSoft)":"var(--warnSoft)",color:done?"var(--done)":"var(--warn)"}}>
                  <Icon n={done?"circleCheck":"zap"} s={11}/> contradicts: {other?trunc(other.text,26):"—"}
                </button>; })}
            </div>
          )}

          {replying&&<div style={{marginTop:8}}><Composer placeholder="Write a reply…" compact onSave={t=>{h.addNode(id,t);setReplying(false);}} onCancel={()=>setReplying(false)}/></div>}
        </div>

        {!linkMode&&(
          <div className="bb-actions" style={{display:"flex",gap:2,flexShrink:0}}>
            <IconBtn label="Reply" onClick={()=>{if(h.collapsed.has(id))h.toggle(id);setReplying(true);}}><Icon n="reply" s={15}/></IconBtn>
            <IconBtn label="Flag contradiction" warn onClick={()=>h.startLink(id)}><Icon n="zap" s={15}/></IconBtn>
            <IconBtn label="Edit" onClick={()=>setEditing(true)}><Icon n="pencil" s={14}/></IconBtn>
            <IconBtn label="Delete" danger onClick={()=>h.delNode(id)}><Icon n="trash" s={14}/></IconBtn>
          </div>
        )}
      </div>

      <div style={{display:"grid",gridTemplateRows:open?"1fr":"0fr",transition:"grid-template-rows .24s ease"}}>
        <div style={{overflow:"hidden"}}>
          {kids.length>0&&<div style={{marginLeft:22,paddingLeft:14,borderLeft:"1.5px solid var(--guide)"}}>
            {kids.map(cid=><Node key={cid} id={cid} data={data} h={h}/>)}
          </div>}
        </div>
      </div>
    </div>
  );
}

/* ===================== Composer ===================== */
function Composer({placeholder,initial="",onSave,onCancel,compact}){
  const [val,setVal]=useState(initial); const ref=useRef(null);
  useEffect(()=>{ref.current&&ref.current.focus();},[]);
  const commit=()=>{const t=val.trim();t?onSave(t):onCancel();};
  return (
    <div style={{display:"flex",alignItems:"flex-start",gap:8,padding:compact?"2px 0":"8px 10px"}}>
      <textarea ref={ref} value={val} onChange={e=>setVal(e.target.value)} placeholder={placeholder} rows={2}
        onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();commit();} else if(e.key==="Escape"){e.preventDefault();onCancel();} }}
        onBlur={commit}
        style={{flex:1,minWidth:0,border:"1px solid var(--accentLine)",borderRadius:8,padding:"8px 11px",fontSize:14,color:"var(--ink)",outline:"none",resize:"vertical",boxShadow:"0 0 0 3px var(--accentSoft)"}}/>
      <span style={{fontSize:10.5,color:"var(--inkFaint)",whiteSpace:"nowrap",marginTop:9}}>↵ send · esc</span>
    </div>
  );
}

/* ===================== Contradiction drawer ===================== */
function Panel({data,onClose,onResolve,onReopen,onRemove,onJump}){
  const open=data.links.filter(l=>l.status==="open");
  const resolved=data.links.filter(l=>l.status==="resolved");
  return (
    <React.Fragment>
      <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(20,28,46,.32)",zIndex:20}}/>
      <aside className="scroll" style={{position:"fixed",top:0,right:0,bottom:0,width:"min(400px,100%)",background:"var(--panel)",zIndex:21,boxShadow:"-8px 0 30px rgba(20,28,46,.14)",overflowY:"auto"}}>
        <div style={{position:"sticky",top:0,background:"var(--panel)",borderBottom:"1px solid var(--line)",padding:"15px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:15,fontWeight:700,color:"var(--accent)"}}><Icon n="zap" s={17}/> <span style={{color:"var(--ink)"}}>Contradictions</span></div>
          <button onClick={onClose} style={iconBtn("var(--inkSoft)")}><Icon n="x" s={18}/></button>
        </div>
        <div style={{padding:16}}>
          {data.links.length===0?
            <p style={{color:"var(--inkFaint)",fontSize:13.5,lineHeight:1.55}}>No contradictions yet. On any message, tap the ⚡ icon, then click the message it conflicts with.</p>
           :<React.Fragment>
              {open.length>0&&<Group t={"Open · "+open.length}/>}
              {open.map(l=><LinkCard key={l.id} l={l} data={data} {...{onResolve,onReopen,onRemove,onJump}}/>)}
              {resolved.length>0&&<Group t={"Resolved · "+resolved.length}/>}
              {resolved.map(l=><LinkCard key={l.id} l={l} data={data} {...{onResolve,onReopen,onRemove,onJump}}/>)}
            </React.Fragment>}
        </div>
      </aside>
    </React.Fragment>
  );
}
function Group({t}){return <div style={{fontSize:11,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",color:"var(--inkFaint)",margin:"14px 0 8px"}}>{t}</div>;}

function LinkCard({l,data,onResolve,onReopen,onRemove,onJump}){
  const [resolving,setResolving]=useState(false);
  const a=data.nodes[l.a], b=data.nodes[l.b], open=l.status==="open";
  return (
    <div style={{border:"1px solid var(--line)",borderRadius:11,padding:12,marginBottom:10,background:open?"#fff":"var(--canvas)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <Status open={open}/>
        <button onClick={()=>onRemove(l.id)} style={iconBtn("var(--danger)")}><Icon n="trash" s={14}/></button>
      </div>
      <SideMini label="A" line="var(--accentLine)" node={a} onJump={onJump}/>
      <div style={{display:"grid",placeItems:"center",margin:"2px 0",color:"var(--warn)"}}><Icon n="zap" s={14}/></div>
      <SideMini label="B" line="var(--warnLine)" node={b} onJump={onJump}/>
      {!open&&l.resolution&&(
        <div style={{marginTop:10,background:"var(--doneSoft)",border:"1px solid #BFE6C9",borderRadius:9,padding:"9px 11px"}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--done)",marginBottom:l.resolution.text?4:0}}>{(VERDICTS.find(v=>v.k===l.resolution.verdict)||{}).l||"Resolved"}</div>
          {l.resolution.text&&<p style={{margin:"0 0 5px",fontSize:13,lineHeight:1.5}}>{l.resolution.text}</p>}
          <div style={{fontSize:11,color:"var(--inkSoft)"}}>{l.resolution.resolver} · {when(l.resolution.resolvedAt)}</div>
        </div>
      )}
      <div style={{marginTop:10}}>
        {open?(resolving?
          <Resolve onSubmit={r=>{onResolve(l.id,r);setResolving(false);}} onCancel={()=>setResolving(false)}/>
          :<button onClick={()=>setResolving(true)} style={btn("var(--accent)","#fff")}><Icon n="check" s={15}/> Resolve</button>)
         :<button onClick={()=>onReopen(l.id)} style={btn("#fff","var(--inkSoft)",true)}><Icon n="rotate" s={14}/> Reopen</button>}
      </div>
    </div>
  );
}
function SideMini({label,line,node,onJump}){
  return (
    <button onClick={()=>node&&onJump(node.id)} style={{width:"100%",textAlign:"left",border:"1px solid "+line,borderRadius:9,padding:"8px 10px",background:"#fff",cursor:node?"pointer":"default"}}>
      <div style={{fontSize:10,fontWeight:700,letterSpacing:.5,color:"var(--inkFaint)",marginBottom:3}}>SIDE {label}{node?" · "+node.author:""}</div>
      <div style={{fontSize:13,lineHeight:1.45,color:"var(--ink)"}}>{node?node.text:"(message deleted)"}</div>
    </button>
  );
}
function Resolve({onSubmit,onCancel}){
  const [text,setText]=useState(""); const [verdict,setVerdict]=useState("both");
  return (
    <div style={{background:"#fff",border:"1px solid var(--line)",borderRadius:9,padding:11}}>
      <textarea value={text} onChange={e=>setText(e.target.value)} rows={2} placeholder="How is it settled?" autoFocus
        style={{width:"100%",border:"1px solid var(--line)",borderRadius:7,padding:"8px 10px",fontSize:13.5,color:"var(--ink)",outline:"none",resize:"vertical"}}/>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,margin:"8px 0"}}>
        {VERDICTS.map(v=><button key={v.k} onClick={()=>setVerdict(v.k)}
          style={{border:"none",borderRadius:6,padding:"5px 9px",fontSize:12,fontWeight:600,cursor:"pointer",
          background:verdict===v.k?"var(--accent)":"#fff",color:verdict===v.k?"#fff":"var(--inkSoft)",boxShadow:verdict===v.k?"none":"inset 0 0 0 1px var(--line)"}}>{v.l}</button>)}
      </div>
      <div style={{display:"flex",gap:7}}>
        <button onClick={()=>onSubmit({text:text.trim(),verdict})} style={btn("var(--done)","#fff")}><Icon n="check" s={15}/> Mark resolved</button>
        <button onClick={onCancel} style={btn("#fff","var(--inkSoft)",true)}>Cancel</button>
      </div>
    </div>
  );
}

/* ===================== small pieces ===================== */
function IconBtn({children,label,onClick,danger,warn}){
  const [hov,setHov]=useState(false);
  const color=danger?"var(--danger)":warn?"var(--warn)":"var(--inkSoft)";
  return <button aria-label={label} title={label} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    onClick={e=>{e.stopPropagation();onClick();}}
    style={{width:28,height:28,display:"grid",placeItems:"center",border:"none",borderRadius:7,cursor:"pointer",color,
    background:hov?(danger?"#FDEEE6":warn?"var(--warnSoft)":"var(--canvas)"):"transparent"}}>{children}</button>;
}
function Status({open}){
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,
    background:open?"var(--warnSoft)":"var(--doneSoft)",color:open?"var(--warn)":"var(--done)"}}>
    <Icon n={open?"circleDot":"circleCheck"} s={11}/>{open?"Open":"Resolved"}</span>;
}
function Empty({onAdd}){
  return (
    <div style={{maxWidth:410,margin:"9vh auto 0",textAlign:"center",padding:20}}>
      <div style={{width:58,height:58,borderRadius:15,background:"var(--accentSoft)",color:"var(--accent)",display:"grid",placeItems:"center",margin:"0 auto 16px"}}><Icon n="msg" s={26}/></div>
      <h2 style={{fontSize:19,fontWeight:700,margin:"0 0 8px",letterSpacing:-0.3}}>Start the conversation</h2>
      <p style={{fontSize:14,color:"var(--inkSoft)",lineHeight:1.55,margin:"0 0 18px"}}>Open a thread, and replies branch beneath it as far as they need. When two messages don't line up, flag them as a contradiction and let anyone resolve it.</p>
      <button onClick={onAdd} style={{...btn("var(--accent)","#fff"),margin:"0 auto"}}><Icon n="plus" s={16}/> New thread</button>
    </div>
  );
}

/* ===================== utils ===================== */
function btn(bg,color,outline){return {display:"inline-flex",alignItems:"center",justifyContent:"center",gap:7,padding:"9px 14px",border:"none",borderRadius:9,background:bg,color,fontSize:13.5,fontWeight:600,cursor:"pointer",boxShadow:outline?"inset 0 0 0 1px var(--line)":"none"};}
function pill(active){return {display:"inline-flex",alignItems:"center",gap:5,padding:"8px 11px",border:"none",borderRadius:9,fontSize:13,fontWeight:700,cursor:"pointer",background:active?"var(--warnSoft)":"#fff",color:active?"var(--warn)":"var(--inkSoft)",boxShadow:active?"none":"inset 0 0 0 1px var(--line)"};}
function iconBtn(color){return {width:28,height:28,display:"grid",placeItems:"center",border:"none",borderRadius:7,background:"transparent",color,cursor:"pointer"};}
function initials(n){const p=(n||"?").trim().split(/\s+/);return ((p[0]&&p[0][0]||"?")+(p[1]&&p[1][0]||"")).toUpperCase();}
function hashName(n){let h=0;for(let i=0;i<(n||"").length;i++)h=(h*31+n.charCodeAt(i))>>>0;return h;}
function trunc(s,n){return s.length>n?s.slice(0,n-1)+"…":s;}
function when(iso){try{const d=new Date(iso);return d.toLocaleDateString(undefined,{month:"short",day:"numeric"})+", "+d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});}catch(e){return "";}}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
